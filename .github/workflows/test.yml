name: Test

# Reusable test suite, called by both ci.yml and release-please.yml so the
# release phase runs the exact same checks CI does and only proceeds when
# they pass.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Test (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.4']
    steps:
      - uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Lint (php -l)
        run: composer run-script lint

      - name: WordPress Coding Standards
        run: composer run-script phpcs

      - name: PHPUnit
        run: composer run-script test
